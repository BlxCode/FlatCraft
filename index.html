</h1>
   </canvas>
   
   <script src="./script.js"></script>
   <script>
    let lastTime = performance.now();
let frameCount = 0;
let fps = 0;
function fpsLoop() {
 const now = performance.now();
 frameCount++;
 // Update FPS every second
 if (now - lastTime >= 1000) {
   fps = frameCount;
   frameCount = 0;
   lastTime = now;
   document.getElementById('fpsCounter').textContent = `FPS: ${fps}`;
 }
 requestAnimationFrame(fpsLoop);
}
'<div id="fpsCounter" style="position:fixed;top:10px;left:10px;color:white;background:black;padding:4px;font-family:monospace;"></div>';
fpsLoop();
   </script>
